# Render Blueprint: deploy the full site (landing, login, chat) to a public https:// URL.
# In Render: New → Blueprint → connect this repo, then add secret env vars in the dashboard.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: real-agent
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: openai
      # Add your LLM key in the Render dashboard (required for chat):
      - key: OPENAI_API_KEY
        sync: false
      # Optional:
      # - key: GEMINI_API_KEY
      #   sync: false
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: RENTCAST_API_KEY
      #   sync: false
      # - key: SERPAPI_API_KEY
      #   sync: false
